services:

  # ── Object storage ───────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Create the ml-provenance bucket on first startup
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/ml-provenance &&
        echo 'Bucket ml-provenance ready'
      "

  # ── Atlas CLI sidecar (must be healthy before pipeline services start) ───────
  atlas-sidecar:
    build: ./services/atlas-sidecar
    image: ml-provenance/atlas-sidecar:latest
    ports:
      - "8004:8004"
    environment:
      DEPLOYMENT_MODE: docker-compose
      MANIFESTS_DIR: /manifests/atlas
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ml-provenance
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      PIPELINE_ID: default
      PIPELINE_STAGES: data-ingestion,preprocessing,fine-tuning
    volumes:
      - atlas-manifests:/manifests
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Pipeline stage 1: data ingestion ─────────────────────────────────────────
  data-ingestion:
    build: ./services/data-ingestion
    image: ml-provenance/data-ingestion:latest
    ports:
      - "8001:8001"
    environment:
      DEPLOYMENT_MODE: docker-compose
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ml-provenance
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      PIPELINE_ID: default
      PIPELINE_ROOT_PREFIX: pipelines
      DATASET_NAME: imdb
      HF_HOME: /app/cache
      ATLAS_SIDECAR_URL: http://atlas-sidecar:8004
    volumes:
      - hf-cache:/app/cache
    depends_on:
      minio-init:
        condition: service_completed_successfully
      atlas-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Pipeline stage 2: preprocessing ──────────────────────────────────────────
  preprocessing:
    build: ./services/preprocessing
    image: ml-provenance/preprocessing:latest
    ports:
      - "8002:8002"
    environment:
      DEPLOYMENT_MODE: docker-compose
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ml-provenance
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      PIPELINE_ID: default
      PIPELINE_ROOT_PREFIX: pipelines
      BERT_MODEL: bert-base-uncased
      MAX_SEQ_LENGTH: "128"
      CHUNK_SIZE: "64"
      HF_HOME: /app/cache
      ATLAS_SIDECAR_URL: http://atlas-sidecar:8004
    volumes:
      - hf-cache:/app/cache
    depends_on:
      minio-init:
        condition: service_completed_successfully
      atlas-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Pipeline stage 3: fine-tuning ────────────────────────────────────────────
  fine-tuning:
    build: ./services/fine-tuning
    image: ml-provenance/fine-tuning:latest
    ports:
      - "8003:8003"
    environment:
      DEPLOYMENT_MODE: docker-compose
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ml-provenance
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      PIPELINE_ID: default
      PIPELINE_ROOT_PREFIX: pipelines
      MODEL_ARTIFACT_NAME: classifier
      BERT_MODEL: bert-base-uncased
      MAX_SEQ_LENGTH: "128"
      EPOCHS: "3"
      BATCH_SIZE: "16"
      LEARNING_RATE: "2e-5"
      WARMUP_RATIO: "0.1"
      HF_HOME: /app/cache
      ATLAS_SIDECAR_URL: http://atlas-sidecar:8004
    volumes:
      - hf-cache:/app/cache
    depends_on:
      minio-init:
        condition: service_completed_successfully
      atlas-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  minio-data:
  hf-cache:
  atlas-manifests:
