# k8s/services.yaml
# Deploys all three ML pipeline services into the ml-pipeline namespace.
# Each service gets a Deployment + ClusterIP Service.
# Apply with: kubectl apply -f k8s/services.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: ml-pipeline

---
# ── Shared MinIO credentials ──────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-config
  namespace: ml-pipeline
data:
  MINIO_ENDPOINT:  "http://minio.minio.svc.cluster.local:9000"
  ARTIFACT_BUCKET: "atlas-artifacts"
  DATASET_NAME:    "imdb"

---
apiVersion: v1
kind: Secret
metadata:
  name: minio-creds
  namespace: ml-pipeline
stringData:
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin

---
# ── Stage 1: Data Ingestion ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-ingestion
  namespace: ml-pipeline
spec:
  replicas: 1
  selector:
    matchLabels: {app: data-ingestion}
  template:
    metadata:
      labels: {app: data-ingestion}
    spec:
      containers:
        - name: data-ingestion
          image: ml-provenance/data-ingestion:latest
          imagePullPolicy: Never       # loaded via kind load
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef: {name: minio-config}
            - secretRef:    {name: minio-creds}
          resources:
            requests: {memory: "256Mi", cpu: "100m"}
            limits:   {memory: "512Mi", cpu: "500m"}
          readinessProbe:
            httpGet: {path: /health, port: 8001}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: 8001}
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: data-ingestion
  namespace: ml-pipeline
spec:
  selector: {app: data-ingestion}
  ports:
    - port: 8001
      targetPort: 8001

---
# ── Stage 2: Preprocessing ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: preprocessing
  namespace: ml-pipeline
spec:
  replicas: 1
  selector:
    matchLabels: {app: preprocessing}
  template:
    metadata:
      labels: {app: preprocessing}
    spec:
      containers:
        - name: preprocessing
          image: ml-provenance/preprocessing:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef: {name: minio-config}
            - secretRef:    {name: minio-creds}
          env:
            - {name: TOKENIZER_NAME, value: "bert-base-uncased"}
            - {name: MAX_LENGTH,     value: "128"}
          resources:
            requests: {memory: "512Mi", cpu: "200m"}
            limits:   {memory: "1Gi",   cpu: "1000m"}
          readinessProbe:
            httpGet: {path: /health, port: 8002}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: 8002}
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: preprocessing
  namespace: ml-pipeline
spec:
  selector: {app: preprocessing}
  ports:
    - port: 8002
      targetPort: 8002

---
# ── Stage 3: Fine-tuning ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fine-tuning
  namespace: ml-pipeline
spec:
  replicas: 1
  selector:
    matchLabels: {app: fine-tuning}
  template:
    metadata:
      labels: {app: fine-tuning}
    spec:
      containers:
        - name: fine-tuning
          image: ml-provenance/fine-tuning:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef: {name: minio-config}
            - secretRef:    {name: minio-creds}
          env:
            - {name: BASE_MODEL,    value: "bert-base-uncased"}
            - {name: NUM_EPOCHS,    value: "2"}
            - {name: BATCH_SIZE,    value: "16"}
            - {name: LEARNING_RATE, value: "2e-5"}
          resources:
            requests: {memory: "2Gi", cpu: "1000m"}
            limits:   {memory: "4Gi", cpu: "2000m"}
          readinessProbe:
            httpGet: {path: /health, port: 8003}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: 8003}
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: fine-tuning
  namespace: ml-pipeline
spec:
  selector: {app: fine-tuning}
  ports:
    - port: 8003
      targetPort: 8003
