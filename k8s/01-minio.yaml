# MinIO – S3-compatible local object storage
# Replaces AWS S3 for local Kubernetes development.
# Access the web console at http://localhost:9001 after port-forwarding.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: ml-pipeline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: ml-pipeline
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-04-06T05-26-02Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: ml-pipeline
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# Secret – change these values before production deployment
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: ml-pipeline
type: Opaque
stringData:
  access-key: minioadmin
  secret-key: minioadmin
---
# Job: create the ml-provenance bucket on first startup
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: ml-pipeline
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://minio:9000/minio/health/ready; do
                echo "waiting for minio…"; sleep 3
              done
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-04-18T16-45-29Z
          env:
            - name: MC_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MC_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
          command:
            - sh
            - -c
            - |
              mc alias set local http://minio:9000 $MC_ACCESS_KEY $MC_SECRET_KEY
              mc mb --ignore-existing local/ml-provenance
              echo "Bucket ml-provenance ready"
