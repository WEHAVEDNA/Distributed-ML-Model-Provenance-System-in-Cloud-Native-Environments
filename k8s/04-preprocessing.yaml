apiVersion: apps/v1
kind: Deployment
metadata:
  name: preprocessing
  namespace: ml-pipeline
  labels:
    app: preprocessing
    pipeline-stage: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: preprocessing
  template:
    metadata:
      labels:
        app: preprocessing
        pipeline-stage: "2"
    spec:
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O /dev/null http://minio:9000/minio/health/ready; do
                echo "waiting for minio…"; sleep 3
              done
        - name: wait-for-atlas-sidecar
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O /dev/null http://atlas-sidecar:8004/health; do
                echo "waiting for atlas-sidecar…"; sleep 3
              done
      containers:
        - name: preprocessing
          image: ml-provenance/preprocessing:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: ml-pipeline-config
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
          volumeMounts:
            - name: hf-cache
              mountPath: /app/cache
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: preprocessing
  namespace: ml-pipeline
  labels:
    app: preprocessing
spec:
  selector:
    app: preprocessing
  ports:
    - name: http
      port: 8002
      targetPort: 8002
  type: ClusterIP
