version: "3.9"

# Local development stack – no Kubernetes required.
# All services share the ml-pipeline network and MinIO as S3 storage.
#
# Usage:
#   docker compose up --build
#   ./scripts/run_pipeline.sh

networks:
  ml-pipeline:
    driver: bridge

volumes:
  minio-data:
  hf-cache:        # shared HuggingFace model weight cache
  atlas-manifests: # C2PA manifests written by atlas-sidecar

x-ml-env: &ml-env
  S3_ENDPOINT_URL:  "http://minio:9000"
  S3_BUCKET:        "ml-provenance"
  AWS_ACCESS_KEY_ID:     "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin"
  AWS_DEFAULT_REGION:    "us-east-1"
  BERT_MODEL:       "bert-base-uncased"
  MAX_SEQ_LENGTH:   "128"
  HF_HOME: "/app/cache"
  ATLAS_SIDECAR_URL: "http://atlas-sidecar:8004"

services:

  # ── MinIO (S3-compatible object store) ─────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # web console  →  http://localhost:9001
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-pipeline

  # ── MinIO bucket initialisation (runs once then exits) ────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/ml-provenance &&
        echo 'Bucket ml-provenance ready'
      "
    networks:
      - ml-pipeline

  # ── Atlas Provenance Sidecar ──────────────────────────────────────────────
  atlas-sidecar:
    build:
      context: ./services/atlas-sidecar
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      S3_ENDPOINT_URL:       "http://minio:9000"
      S3_BUCKET:             "ml-provenance"
      AWS_ACCESS_KEY_ID:     "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      AWS_DEFAULT_REGION:    "us-east-1"
      MANIFESTS_DIR:         "/manifests/atlas"
    volumes:
      - atlas-manifests:/manifests
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=4)"]
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 30s
    networks:
      - ml-pipeline

  # ── Stage 1: Data Ingestion ───────────────────────────────────────────────
  data-ingestion:
    build:
      context: ./services/data-ingestion
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      <<: *ml-env
      DATASET_NAME: "imdb"
    volumes:
      - hf-cache:/app/cache
    depends_on:
      minio:
        condition: service_healthy
      atlas-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=4)"]
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 10s
    networks:
      - ml-pipeline

  # ── Stage 2: Preprocessing ────────────────────────────────────────────────
  preprocessing:
    build:
      context: ./services/preprocessing
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      <<: *ml-env
      CHUNK_SIZE: "64"
    volumes:
      - hf-cache:/app/cache
    depends_on:
      data-ingestion:
        condition: service_healthy
      atlas-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=4)"]
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 10s
    networks:
      - ml-pipeline

  # ── Stage 3: Fine-Tuning & Inference ─────────────────────────────────────
  fine-tuning:
    build:
      context: ./services/fine-tuning
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      <<: *ml-env
      EPOCHS:        "3"
      BATCH_SIZE:    "16"
      LEARNING_RATE: "2e-5"
      WARMUP_RATIO:  "0.1"
    volumes:
      - hf-cache:/app/cache
    depends_on:
      preprocessing:
        condition: service_healthy
      atlas-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=4)"]
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 10s
    networks:
      - ml-pipeline
