[pytest]
markers =
    smoke:       fast health-check and schema tests, no pipeline data required
    slow:        requires a trained model (fine-tuning takes 10-30 min on CPU)
    integration: full pipeline tests
    wired:       requires ATLAS_SIDECAR_URL set in pipeline containers so services auto-call the sidecar

# Show short test summary for failures only
addopts = -ra --tb=short

# No global timeout – wait_for_job() in conftest.py enforces per-job deadlines.
# Individual fast tests opt-in with @pytest.mark.timeout(N).
timeout = 0

# Test file discovery
testpaths = .

# ── Suggested run commands ─────────────────────────────────────────────────────
# pytest -v -m smoke                            # health + schema checks (fast, no side effects)
# pytest -v                                     # all non-slow tests
# pytest -v -m "wired" --samples 200            # provenance chain after pipeline
# pytest -v -m slow --samples 500               # full suite including fine-tuning
# pytest test_provenance_chain.py -v -m smoke   # provenance chain schema only
